services:
  - type: pserv
    name: rabbitcode-rabbitmq
    runtime: docker
    plan: starter
    dockerfilePath: ./infra/rabbitmq/Dockerfile
    dockerContext: ./infra/rabbitmq
    disk:
      name: rabbitmq-data
      mountPath: /var/lib/rabbitmq
      sizeGB: 10
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: rabbitcode
      - key: RABBITMQ_DEFAULT_PASS
        generateValue: true
      - key: RABBITMQ_ERLANG_COOKIE
        generateValue: true

  - type: web
    name: rabbitcode-clientes
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn clientes:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: clientes-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 8000
      - key: DATA_DIR
        value: /var/data
      - key: CLIENTES_CSV
        value: /var/data/clientes.csv
      - key: RABBITMQ_HOST
        fromService:
          type: pserv
          name: rabbitcode-rabbitmq
          property: host
      - key: RABBITMQ_PORT
        value: 5672
      - key: RABBITMQ_USER
        fromService:
          type: pserv
          name: rabbitcode-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_USER
      - key: RABBITMQ_PASS
        fromService:
          type: pserv
          name: rabbitcode-rabbitmq
          envVarKey: RABBITMQ_DEFAULT_PASS

